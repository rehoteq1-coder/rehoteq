  <style>
    body{background:#080808;font-family:'DM Sans',sans-serif;color:#F0F0F0;margin:0;}

    .btn-gold{background:#F5A623;color:#000;}
    .btn-red{background:#E74C3C;color:#fff;}
    .update-item{margin:8px 0;padding:8px;border:1px solid #2C2C2C;border-radius:6px;}
    .question{margin-bottom:20px;}
    .option{padding:8px;border:1px solid #2C2C2C;border-radius:6px;margin:6px 0;cursor:pointer;}
    .option.selected{background:#F5A62320;border-color:#F5A623;}

</head>
<body>

<!-- DASHBOARD -->
<div class="screen active" id="screen-dashboard">
  <div class="dashboard">
    <h2 id="dash-greeting">Welcome back, Student</h2>
    <h3>My Reviews</h3>
    <div id="dash-reviews"></div>
    <button class="btn btn-gold" onclick="startExam()">Start Exam</button>
  </div>
</div>
<!-- SUBJECT SELECTION -->
<div id="screen-subject" class="screen active">
  <h2>Select Subject</h2>
  <select id="subjectSelect">
    <option value="English">English</option>
    <option value="Physics">Physics</option>
    <option value="Government">Government</option>
    <option value="Chemistry">Chemistry</option>
    <option value="Biology">Biology</option>
    <option value="Mathematics">Mathematics</option>
    <option value="Economics">Economics</option>
    <option value="Commerce">Commerce</option>
    <option value="Accounting">Accounting</option>
  </select>
  <button class="btn btn-gold" onclick="startExam()">Start Exam</button>
</div>
<!-- CBT EXAM -->
<div class="screen" id="screen-cbt">
  <div class="exam">
    <h2>Exam in Progress</h2>
    <div class="q-text"></div>
    <div class="options-list"></div>
    <button class="btn btn-gold" onclick="nextQuestion()">Next</button>
    <button class="btn btn-red" onclick="finishExam()">Submit Exam</button>
    <p id="exam-timer"></p>
  </div>
</div>

<!-- RESULTS -->
<div class="screen" id="screen-results">
  <div class="results">
    <h2>Exam Results</h2>
    <p id="result-score"></p>
    <div id="result-breakdown"></div>
    <button class="btn btn-gold" onclick="showDashboard()">Back to Dashboard</button>
  </div>
</div>

  // ===== Exam Logic =====
  let currentSubject = "English";
  let currentIndex = 0;
  let answers = {};
  let timer;

  function showScreen(id) {
    document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
    document.getElementById(id).classList.add("active");
  }

  function startExam() {
    showScreen("screen-cbt");
    currentSubject = "English"; // default subject
    currentIndex = 0;
    answers = {};
    showQuestion();
    startTimer(120); // 2 minutes demo timer
  }

  function showQuestion() {
    const q = questions[currentSubject][currentIndex];
    document.querySelector(".q-text").innerText = q.text;
    const optionsList = document.querySelector(".options-list");
    optionsList.innerHTML = "";
    q.options.forEach((opt, i) => {
      const div = document.createElement("div");
      div.className = "option";
      div.innerHTML = `${String.fromCharCode(65+i)}. ${opt}`;
      div.onclick = () => {
        document.querySelectorAll(".option").forEach(o=>o.classList.remove("selected"));
        div.classList.add("selected");
        answers[currentIndex] = opt;
      };
      optionsList.appendChild(div);
    });
  }
  function nextQuestion() {
    if(currentIndex < questions[currentSubject].length-1) {
      currentIndex++;
      showQuestion();
    }
  }

  function startTimer(seconds) {
    clearInterval(timer);
    let timeLeft = seconds;
    timer = setInterval(() => {
      document.getElementById("exam-timer").innerText = "Time left: " + timeLeft + "s";
      timeLeft--;
      if(timeLeft < 0) {
        clearInterval(timer);
        finishExam();
      }
    }, 1000);
  }

  function finishExam() {
    clearInterval(timer);
    let score = 0;
    let breakdown = {};
    Object.keys(questions).forEach(subject => {
      let subjectScore = 0;
      questions[subject].forEach((q, i) => {
        if(answers[i] === q.answer) subjectScore++;
      });
      breakdown[subject] = subjectScore + "/" + questions[subject].length;
      score += subjectScore;
    });
    showResults(score, breakdown);
  }

  function showResults(score, breakdown) {
    showScreen("screen-results");
    document.getElementById("result-score").innerText = "Total Score: " + score;
    const bd = document.getElementById("result-breakdown");
    bd.innerHTML = "";
    for(const subject in breakdown) {
      bd.innerHTML += `<p>${subject}: ${breakdown[subject]}</p>`;
    }
    saveReview(score, breakdown);
  }

  // ===== Dashboard Reviews =====
  function showDashboard() {
    showScreen("screen-dashboard");
    loadReviews();
  }

  function saveReview(score, breakdown) {
    let reviews = JSON.parse(localStorage.getItem("reviews") || "[]");
    reviews.push({ score, breakdown, date: new Date().toLocaleString() });
    localStorage.setItem("reviews", JSON.stringify(reviews));
  }

  function loadReviews() {
    let reviews = JSON.parse(localStorage.getItem("reviews") || "[]");
    const container = document.getElementById("dash-reviews");
    container.innerHTML = "";
    reviews.forEach(r => {
      container.innerHTML += `<div class="update-item">Score: ${r.score} <br>Date: ${r.date}</div>`;
    });
  }
</script>
