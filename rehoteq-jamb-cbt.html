<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Rehoteq Pre-JAMB CBT Practice</title>
  <style>
    body{background:#080808;font-family:'DM Sans',sans-serif;color:#F0F0F0;margin:0;}
    .screen{display:none;}
    .screen.active{display:block;}
    .auth-box,.dashboard,.results,.exam{max-width:700px;margin:40px auto;padding:20px;background:#101010;border-radius:12px;}
    .btn{padding:10px 20px;border:none;border-radius:8px;cursor:pointer;font-weight:700;}
    .btn-gold{background:#F5A623;color:#000;}
    .btn-red{background:#E74C3C;color:#fff;}
    .update-item{margin:8px 0;padding:8px;border:1px solid #2C2C2C;border-radius:6px;}
    .question{margin-bottom:20px;}
    .option{padding:8px;border:1px solid #2C2C2C;border-radius:6px;margin:6px 0;cursor:pointer;}
    .option.selected{background:#F5A62320;border-color:#F5A623;}
  </style>
</head>
<body>

<!-- DASHBOARD -->
<div class="screen active" id="screen-dashboard">
  <div class="dashboard">
    <h2 id="dash-greeting">Welcome back, Student</h2>
    <h3>My Reviews</h3>
    <div id="dash-reviews"></div>
    <button class="btn btn-gold" onclick="startExam()">Start Exam</button>
  </div>
</div>

<!-- CBT EXAM -->
<div class="screen" id="screen-cbt">
  <div class="exam">
    <h2>Exam in Progress</h2>
    <div class="q-text"></div>
    <div class="options-list"></div>
    <button class="btn btn-gold" onclick="nextQuestion()">Next</button>
    <button class="btn btn-red" onclick="finishExam()">Submit Exam</button>
    <p id="exam-timer"></p>
  </div>
</div>

<!-- RESULTS -->
<div class="screen" id="screen-results">
  <div class="results">
    <h2>Exam Results</h2>
    <p id="result-score"></p>
    <div id="result-breakdown"></div>
    <button class="btn btn-gold" onclick="showDashboard()">Back to Dashboard</button>
  </div>
</div>

<script>
  // ===== Sample JAMB Questions embedded here =====
  const questions = {
    English: [
  {text:"Choose the word opposite in meaning to 'benevolent'.", options:["Kind","Cruel","Generous","Friendly"], answer:"Cruel"},
  {text:"Fill in the blank: He insisted ___ going to the party.", options:["on","in","at","for"], answer:"on"},
  {text:"Which of these is a synonym for 'happy'?", options:["Sad","Joyful","Angry","Tired"], answer:"Joyful"},
  {text:"Select the correct spelling.", options:["Accomodate","Acommodate","Accommodate","Acomodate"], answer:"Accommodate"},
  {text:"Choose the word opposite in meaning to 'expand'.", options:["Increase","Enlarge","Contract","Grow"], answer:"Contract"},
  {text:"Fill in the blank: She is very good ___ mathematics.", options:["at","in","on","for"], answer:"at"},
  {text:"Which of these is a noun?", options:["Run","Quickly","Happiness","Blue"], answer:"Happiness"},
  {text:"Choose the correct tense: He ___ to school yesterday.", options:["go","went","gone","going"], answer:"went"},
  {text:"Pick the correct option: The plural of 'child' is ___", options:["childs","children","childes","child"], answer:"children"},
  {text:"Choose the word opposite in meaning to 'ancient'.", options:["Old","Modern","Historic","Past"], answer:"Modern"},
  {text:"Fill in the blank: The boy ___ playing football now.", options:["is","are","was","were"], answer:"is"},
  {text:"Which of these is an adjective?", options:["Run","Beautiful","Quickly","Sing"], answer:"Beautiful"},
  {text:"Choose the correct option: The past tense of 'eat' is ___", options:["eated","ate","eaten","eats"], answer:"ate"},
  {text:"Pick the synonym of 'fast'.", options:["Slow","Rapid","Late","Weak"], answer:"Rapid"},
  {text:"Choose the opposite of 'victory'.", options:["Success","Defeat","Win","Triumph"], answer:"Defeat"},
  {text:"Fill in the blank: He ___ his homework before dinner.", options:["do","did","done","does"], answer:"did"},
  {text:"Which of these is a pronoun?", options:["Book","She","Run","Happy"], answer:"She"},
  {text:"Choose the correct option: The comparative of 'good' is ___", options:["gooder","better","best","more good"], answer:"better"},
  {text:"Pick the opposite of 'polite'.", options:["Kind","Rude","Gentle","Respectful"], answer:"Rude"},
  {text:"Fill in the blank: They ___ going to the market.", options:["is","are","was","were"], answer:"are"},
  {text:"Which of these is a verb?", options:["Jump","Blue","Happy","Chair"], answer:"Jump"},
  {text:"Choose the correct option: The plural of 'mouse' is ___", options:["mouses","mice","mouse","mices"], answer:"mice"},
  {text:"Pick the synonym of 'begin'.", options:["End","Start","Finish","Close"], answer:"Start"},
  {text:"Choose the opposite of 'love'.", options:["Hate","Like","Care","Admire"], answer:"Hate"},
  {text:"Fill in the blank: She ___ a letter yesterday.", options:["write","wrote","written","writes"], answer:"wrote"},
  {text:"Which of these is an adverb?", options:["Quickly","Happy","Run","Chair"], answer:"Quickly"},
  {text:"Choose the correct option: The past tense of 'go' is ___", options:["goes","went","gone","going"], answer:"went"},
  {text:"Pick the synonym of 'big'.", options:["Small","Large","Tiny","Little"], answer:"Large"},
  {text:"Choose the opposite of 'success'.", options:["Failure","Win","Triumph","Achievement"], answer:"Failure"},
  {text:"Fill in the blank: The sun ___ in the east.", options:["rise","rises","rose","rising"], answer:"rises"},
  {text:"Which of these is a conjunction?", options:["And","Run","Blue","Happy"], answer:"And"},
  {text:"Choose the correct option: The plural of 'tooth' is ___", options:["tooths","teeth","tooth","toothes"], answer:"teeth"},
  {text:"Pick the synonym of 'smart'.", options:["Clever","Dull","Slow","Weak"], answer:"Clever"},
  {text:"Choose the opposite of 'rich'.", options:["Poor","Wealthy","Affluent","Prosperous"], answer:"Poor"},
  {text:"Fill in the blank: He ___ reading a book now.", options:["is","are","was","were"], answer:"is"},
  {text:"Which of these is a preposition?", options:["Under","Run","Happy","Chair"], answer:"Under"},
  {text:"Choose the correct option: The past tense of 'see' is ___", options:["saw","seen","see","seeing"], answer:"saw"},
  {text:"Pick the synonym of 'cold'.", options:["Hot","Chilly","Warm","Heat"], answer:"Chilly"},
  {text:"Choose the opposite of 'strong'.", options:["Weak","Powerful","Mighty","Tough"], answer:"Weak"},
  {text:"Fill in the blank: She ___ cooking dinner when I arrived.", options:["was","is","are","were"], answer:"was"}
],
    Physics: [
  {text:"Which of these is a unit of force?", options:["Joule","Newton","Watt","Pascal"], answer:"Newton"},
  {text:"A body of mass 2kg is accelerated at 3m/s². Find the force.", options:["5N","6N","3N","2N"], answer:"6N"},
  {text:"What is the speed of light in vacuum?", options:["3.0 × 10^8 m/s","3.0 × 10^6 m/s","3.0 × 10^5 m/s","3.0 × 10^7 m/s"], answer:"3.0 × 10^8 m/s"},
  {text:"Which of these is a scalar quantity?", options:["Velocity","Force","Mass","Acceleration"], answer:"Mass"},
  {text:"The instrument used to measure current is?", options:["Voltmeter","Ammeter","Galvanometer","Ohmmeter"], answer:"Ammeter"},
  {text:"Which law states that current is directly proportional to voltage?", options:["Newton’s law","Ohm’s law","Hooke’s law","Boyle’s law"], answer:"Ohm’s law"},
  {text:"Which of these is a renewable energy source?", options:["Coal","Petroleum","Solar","Natural gas"], answer:"Solar"},
  {text:"What is the SI unit of power?", options:["Joule","Watt","Newton","Pascal"], answer:"Watt"},
  {text:"Which of these is used to reduce friction?", options:["Oil","Sand","Water","Salt"], answer:"Oil"},
  {text:"Which of these waves requires a medium?", options:["Light","Radio","Sound","X-ray"], answer:"Sound"},
  {text:"Which of these is a vector quantity?", options:["Speed","Distance","Displacement","Energy"], answer:"Displacement"},
  {text:"The acceleration due to gravity on Earth is approximately?", options:["9.8 m/s²","8.9 m/s²","10.8 m/s²","7.8 m/s²"], answer:"9.8 m/s²"},
  {text:"Which of these is a unit of energy?", options:["Watt","Joule","Newton","Pascal"], answer:"Joule"},
  {text:"Which of these is a non-renewable energy source?", options:["Wind","Solar","Coal","Hydro"], answer:"Coal"},
  {text:"Which of these is used to measure temperature?", options:["Barometer","Thermometer","Hygrometer","Voltmeter"], answer:"Thermometer"},
  {text:"Which of these is a unit of pressure?", options:["Newton","Pascal","Joule","Watt"], answer:"Pascal"},
  {text:"Which of these is a unit of frequency?", options:["Hertz","Newton","Joule","Watt"], answer:"Hertz"},
  {text:"Which of these is a unit of charge?", options:["Coulomb","Newton","Joule","Watt"], answer:"Coulomb"},
  {text:"Which of these is a unit of resistance?", options:["Ohm","Newton","Joule","Watt"], answer:"Ohm"},
  {text:"Which of these is a unit of potential difference?", options:["Volt","Newton","Joule","Watt"], answer:"Volt"},
  {text:"Which of these is a unit of capacitance?", options:["Farad","Newton","Joule","Watt"], answer:"Farad"},
  {text:"Which of these is a unit of inductance?", options:["Henry","Newton","Joule","Watt"], answer:"Henry"},
  {text:"Which of these is a unit of magnetic flux?", options:["Weber","Newton","Joule","Watt"], answer:"Weber"},
  {text:"Which of these is a unit of luminous intensity?", options:["Candela","Newton","Joule","Watt"], answer:"Candela"},
  {text:"Which of these is a unit of time?", options:["Second","Newton","Joule","Watt"], answer:"Second"},
  {text:"Which of these is a unit of length?", options:["Meter","Newton","Joule","Watt"], answer:"Meter"},
  {text:"Which of these is a unit of mass?", options:["Kilogram","Newton","Joule","Watt"], answer:"Kilogram"},
  {text:"Which of these is a unit of velocity?", options:["m/s","Newton","Joule","Watt"], answer:"m/s"},
  {text:"Which of these is a unit of acceleration?", options:["m/s²","Newton","Joule","Watt"], answer:"m/s²"},
  {text:"Which of these is a unit of momentum?", options:["kg·m/s","Newton","Joule","Watt"], answer:"kg·m/s"},
  {text:"Which of these is a unit of work?", options:["Joule","Newton","Watt","Pascal"], answer:"Joule"},
  {text:"Which of these is a unit of torque?", options:["Newton-meter","Newton","Joule","Watt"], answer:"Newton-meter"},
  {text:"Which of these is a unit of pressure?", options:["Pascal","Newton
],
   Government: [
      {text:"Who was Nigeria’s first executive president?", options:["Nnamdi Azikiwe","Shehu Shagari","Olusegun Obasanjo","Goodluck Jonathan"], answer:"Shehu Shagari"},
      {text:"The judiciary interprets the law. This is an example of?", options:["Rule of law","Separation of powers","Checks and balances","Democracy"], answer:"Separation of powers"}
    ]
  };

  // ===== Exam Logic =====
  let currentSubject = "English";
  let currentIndex = 0;
  let answers = {};
  let timer;

  function showScreen(id) {
    document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
    document.getElementById(id).classList.add("active");
  }

  function startExam() {
    showScreen("screen-cbt");
    currentSubject = "English"; // default subject
    currentIndex = 0;
    answers = {};
    showQuestion();
    startTimer(120); // 2 minutes demo timer
  }

  function showQuestion() {
    const q = questions[currentSubject][currentIndex];
    document.querySelector(".q-text").innerText = q.text;
    const optionsList = document.querySelector(".options-list");
    optionsList.innerHTML = "";
    q.options.forEach((opt, i) => {
      const div = document.createElement("div");
      div.className = "option";
      div.innerHTML = `${String.fromCharCode(65+i)}. ${opt}`;
      div.onclick = () => {
        document.querySelectorAll(".option").forEach(o=>o.classList.remove("selected"));
        div.classList.add("selected");
        answers[currentIndex] = opt;
      };
      optionsList.appendChild(div);
    });
  }

  function nextQuestion() {
    if(currentIndex < questions[currentSubject].length-1) {
      currentIndex++;
      showQuestion();
    }
  }

  function startTimer(seconds) {
    clearInterval(timer);
    let timeLeft = seconds;
    timer = setInterval(() => {
      document.getElementById("exam-timer").innerText = "Time left: " + timeLeft + "s";
      timeLeft--;
      if(timeLeft < 0) {
        clearInterval(timer);
        finishExam();
      }
    }, 1000);
  }

  function finishExam() {
    clearInterval(timer);
    let score = 0;
    let breakdown = {};
    Object.keys(questions).forEach(subject => {
      let subjectScore = 0;
      questions[subject].forEach((q, i) => {
        if(answers[i] === q.answer) subjectScore++;
      });
      breakdown[subject] = subjectScore + "/" + questions[subject].length;
      score += subjectScore;
    });
    showResults(score, breakdown);
  }

  function showResults(score, breakdown) {
    showScreen("screen-results");
    document.getElementById("result-score").innerText = "Total Score: " + score;
    const bd = document.getElementById("result-breakdown");
    bd.innerHTML = "";
    for(const subject in breakdown) {
      bd.innerHTML += `<p>${subject}: ${breakdown[subject]}</p>`;
    }
    saveReview(score, breakdown);
  }

  // ===== Dashboard Reviews =====
  function showDashboard() {
    showScreen("screen-dashboard");
    loadReviews();
  }

  function saveReview(score, breakdown) {
    let reviews = JSON.parse(localStorage.getItem("reviews") || "[]");
    reviews.push({ score, breakdown, date: new Date().toLocaleString() });
    localStorage.setItem("reviews", JSON.stringify(reviews));
  }

  function loadReviews() {
    let reviews = JSON.parse(localStorage.getItem("reviews") || "[]");
    const container = document.getElementById("dash-reviews");
    container.innerHTML = "";
    reviews.forEach(r => {
      container.innerHTML += `<div class="update-item">Score: ${r.score} <br>Date: ${r.date}</div>`;
    });
  }
</script>
</body>
</html>
